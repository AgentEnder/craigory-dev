packages:
  # Apps directory - contains all applications
  - 'apps/*'

  # Libs directory - contains all libraries/packages
  - 'libs/*'

  # Packages directory - contains publishable npm packages
  - 'packages/*'

  # Tools directory if it contains packages
  - 'tools'
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  cypress: true
  esbuild: true
  nx: true
  protobufjs: true
  re2: true
  unrs-resolver: true
catalog:
  cli-forge: ^1.9.2
  es-main: ^1.4.0
  vike: 0.4.258
  vike-react: ^0.6.5
minimumReleaseAgeExclude:
  - nx
  - '@nx/*'
